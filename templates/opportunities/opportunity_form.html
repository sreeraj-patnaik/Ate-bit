{% extends "base.html" %}

{% block title %}{{ page_title }} | OpportunityHub{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto glass rounded-3xl p-6 md:p-8">
    <p class="text-xs uppercase tracking-[0.18em] text-slate-500 mb-1">Manual entry</p>
    <h1 class="text-3xl font-semibold mb-5">{{ page_title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Save Opportunity</button>
    </form>
</section>
{% endblock %}
